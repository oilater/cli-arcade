name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: darwin-arm64
          - os: ubuntu-latest
            target: linux-x64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install

      - run: bun build src/index.tsx --compile --outfile ca-${{ matrix.target }}

      - uses: actions/upload-artifact@v4
        with:
          name: ca-${{ matrix.target }}
          path: ca-${{ matrix.target }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - run: chmod +x artifacts/ca-*

      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/ca-*
